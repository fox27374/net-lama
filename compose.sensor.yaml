# Sensor deployment.
#
# The agent runs the sensor image (bundles iw + mtr) with HOST networking
# and CAP_NET_RAW, so real traceroute — and, with a wireless adapter, WLAN
# scanning — work. This runs rootless; no sudo needed.
#
# Host networking is required for path tracing: rootless user-mode network
# stacks (slirp4netns / pasta) NAT everything, so the agent would only ever
# see the destination and none of the intermediate routers. With host
# networking the probe packets traverse the real routing table.
#
#   1. docker compose -f compose.sensor.yaml up -d server
#   2. create the agent in the UI, then: echo "NETLAMA_TOKEN=<token>" >> .env
#   3. docker compose -f compose.sensor.yaml up -d
#
# Works the same with podman-compose. The host must allow unprivileged ICMP
# (net.ipv4.ping_group_range) as for the plain agent.

services:
  server:
    image: ${NETLAMA_SERVER_IMAGE:-ghcr.io/fox27374/netlama-server}:${NETLAMA_IMAGE_TAG:-latest}
    ports:
      - "9090:9090"
      - "50051:50051"
    volumes:
      - netlama-data:/data
    environment:
      NETLAMA_ADMIN_PASSWORD: ${NETLAMA_ADMIN_PASSWORD:-}
      # TLS for the gRPC control stream and the HTTPS UI. Provide a real
      # cert via NETLAMA_TLS_CERT/KEY, or set NETLAMA_TLS_SELF_SIGNED=1 to
      # auto-generate one (list the UI hostnames/IPs in NETLAMA_TLS_HOSTS).
      NETLAMA_TLS_CERT: ${NETLAMA_TLS_CERT:-}
      NETLAMA_TLS_KEY: ${NETLAMA_TLS_KEY:-}
      NETLAMA_TLS_SELF_SIGNED: ${NETLAMA_TLS_SELF_SIGNED:-}
      NETLAMA_TLS_HOSTS: ${NETLAMA_TLS_HOSTS:-}
      # mTLS: set NETLAMA_MTLS=1 to require per-agent client certs on the
      # control stream (built-in agent CA; issue certs with
      # `docker compose -f compose.sensor.yaml run --rm server -issue-agent-cert <agent-name>`),
      # or point NETLAMA_MTLS_CA at your own CA bundle.
      NETLAMA_MTLS: ${NETLAMA_MTLS:-}
      NETLAMA_MTLS_CA: ${NETLAMA_MTLS_CA:-}
      # How many log lines (Info+) to keep per scope (the server, and each
      # agent) for the Logs page. Default: 1000.
      NETLAMA_LOG_HISTORY: ${NETLAMA_LOG_HISTORY:-}
      # SMTP configuration for email alert notifications.
      # Host is required to enable email notifications; others are optional.
      # Port default: 587. StartTLS default: enabled (1).
      NETLAMA_SMTP_HOST: ${NETLAMA_SMTP_HOST:-}
      NETLAMA_SMTP_PORT: ${NETLAMA_SMTP_PORT:-}
      NETLAMA_SMTP_USER: ${NETLAMA_SMTP_USER:-}
      NETLAMA_SMTP_PASS: ${NETLAMA_SMTP_PASS:-}
      NETLAMA_SMTP_FROM: ${NETLAMA_SMTP_FROM:-}
      NETLAMA_SMTP_STARTTLS: ${NETLAMA_SMTP_STARTTLS:-}
    restart: unless-stopped

  agent:
    # Reap zombie processes from exec'd tools (mtr, iw) — without an
    # init, orphaned children pile up until the container cannot fork.
    init: true
    image: ${NETLAMA_AGENT_IMAGE:-ghcr.io/fox27374/netlama-agent-sensor}:${NETLAMA_IMAGE_TAG:-latest}
    network_mode: host
    cap_add:
      - NET_RAW    # traceroute: custom-TTL packets + receiving ICMP
      - NET_ADMIN  # WLAN scanning + monitor-mode sensing via iw
    environment:
      # Host networking → reach the server on the published host port.
      NETLAMA_SERVER: ${NETLAMA_SERVER:-127.0.0.1:50051}
      NETLAMA_TOKEN: ${NETLAMA_TOKEN:?create the agent in the UI and put its token into .env}
      # Connect over TLS. Verify with NETLAMA_TLS_CA (a copy of the server
      # cert), or set NETLAMA_TLS_INSECURE=1 to encrypt without verifying.
      NETLAMA_TLS: ${NETLAMA_TLS:-}
      NETLAMA_TLS_CA: ${NETLAMA_TLS_CA:-}
      NETLAMA_TLS_INSECURE: ${NETLAMA_TLS_INSECURE:-}
      # mTLS client certificate (mount the files into the container and
      # point these at the in-container paths).
      NETLAMA_TLS_CERT: ${NETLAMA_TLS_CERT:-}
      NETLAMA_TLS_KEY: ${NETLAMA_TLS_KEY:-}
      NETLAMA_WLAN_DEMO: ${NETLAMA_WLAN_DEMO:-}
      NETLAMA_WLAN_SENSE_DEMO: ${NETLAMA_WLAN_SENSE_DEMO:-}
      NETLAMA_TRACEROUTE_DEMO: ${NETLAMA_TRACEROUTE_DEMO:-}
    depends_on:
      - server
    restart: unless-stopped

volumes:
  netlama-data:
    name: netlama-data
