syntax = "proto3";

package netlama.v1;

option go_package = "github.com/fox27374/net-lama/proto;netlamapb";

import "google/protobuf/timestamp.proto";

// ControlService is the single connection between an agent and the server.
// The agent dials out, registers and keeps the stream open: the server
// pushes configuration and commands down, the agent streams results up.
service ControlService {
  rpc ControlStream(stream AgentMessage) returns (stream ServerMessage);
}

message AgentMessage {
  oneof payload {
    Register register = 1;
    TestResult result = 2;
    LogEntry log = 3;
    AgentStats stats = 4;
  }
}

message ServerMessage {
  oneof payload {
    Config config = 1;
    Command command = 2;
  }
}

// Register must be the first message an agent sends on the stream.
message Register {
  string client_id = 1;
  string client_type = 2;
  string version = 3;
  repeated string capabilities = 4;
  // token authenticates the agent and maps it to a tenant/site. Issued
  // when the agent is created on the server.
  string token = 5;
  // wireless_interfaces the agent detected, for WLAN sensing.
  repeated WirelessInterface wireless_interfaces = 6;
}

message WirelessInterface {
  string name = 1;
  string phy = 2;
  bool supports_monitor = 3;
}

// Config carries the full set of tests the agent has to run. It is
// derived from the tests assigned to the agent's site and fully
// replaces the previous configuration.
message Config {
  repeated TestSpec tests = 1;
  // wlan_interface is reserved (previously used for per-agent interface selection)
  reserved 2;
}

// TestSpec is one named test definition to be executed periodically.
message TestSpec {
  string id = 1;
  string name = 2;
  uint32 interval_seconds = 3;
  oneof params {
    SpeedtestParams speedtest = 4;
    PingParams ping = 5;
    DnsParams dns = 6;
    HttpParams http = 7;
    TcpParams tcp = 8;
    // wlan_scan (9) is reserved
    TracerouteParams traceroute = 10;
    // wlan_sense (11) is reserved
    WlanPassiveParams wlan_passive = 12;
  }
}

message SpeedtestParams {
  // provider selects the speedtest backend: "" or "ookla" (default,
  // speedtest.net via the unofficial client), "ndt7" (M-Lab, official
  // client), or "cloudflare" (speed.cloudflare.com, stdlib-only).
  string provider = 1;
}

message PingParams {
  repeated string targets = 1;
  uint32 count = 2;
}

message DnsParams {
  repeated string queries = 1;
  repeated string servers = 2;
}

message HttpParams {
  string url = 1;
  uint32 timeout_seconds = 2;
  bool skip_tls_verify = 3;
}

message TcpParams {
  repeated string targets = 1; // host:port
  uint32 timeout_seconds = 2;
}

// WlanScanParams is reserved (previously used for managed-mode scans)
message WlanScanParams {}

// WlanSenseParams is reserved (previously used for monitor-mode sweeps)
message WlanSenseParams {
  repeated uint32 channels = 1; // empty = all channels the phy supports
  uint32 dwell_ms = 2;          // per-channel capture time, default 400
}

// WlanPassiveParams configures a passive monitor-mode sweep.
// The agent auto-picks the interface and adapts the channel set based on
// previous sweeps: full spectrum on first run, then narrowed to "interesting"
// channels (where APs or stations were heard).
message WlanPassiveParams {}

message TracerouteParams {
  string target = 1;        // host or IP
  string protocol = 2;      // "icmp" | "tcp" | "udp"
  uint32 port = 3;          // for tcp/udp
  uint32 max_hops = 4;
  uint32 probes_per_hop = 5;
}

message Command {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    RUN_TEST = 1; // run the test named in test_id immediately
  }
  Type type = 1;
  string test_id = 2;
}

message TestResult {
  google.protobuf.Timestamp time = 1;
  // error is set when the test could not be executed; the oneof below
  // then only carries identifying fields (e.g. ping target).
  string error = 2;
  // test_id and test_name identify the TestSpec that produced this result.
  string test_id = 3;
  string test_name = 4;
  oneof result {
    SpeedtestResult speedtest = 5;
    PingResult ping = 6;
    DnsResult dns = 7;
    HttpResult http = 8;
    TcpResult tcp = 9;
    // wlan_scan (10) is reserved
    TracerouteResult traceroute = 11;
    // wlan_sense (12) is reserved
    WlanPassiveResult wlan_passive = 13;
  }
}

message SpeedtestResult {
  string server_name = 1;
  string server_country = 2;
  double latency_ms = 3;
  double download_mbps = 4;
  double upload_mbps = 5;
  string user_ip = 6;
  string user_isp = 7;
  // provider is the backend that produced this result: "ookla", "ndt7" or
  // "cloudflare".
  string provider = 8;
}

message PingResult {
  string target = 1;
  uint32 packets_sent = 2;
  uint32 packets_received = 3;
  double loss_percent = 4;
  double min_rtt_ms = 5;
  double avg_rtt_ms = 6;
  double max_rtt_ms = 7;
}

message DnsResult {
  string query = 1;
  string server = 2;
  bool success = 3;
  double resolve_time_ms = 4;
  repeated string addresses = 5;
}

message HttpResult {
  string url = 1;
  uint32 status_code = 2;
  double dns_ms = 3;
  double connect_ms = 4;
  double tls_ms = 5;
  double ttfb_ms = 6;
  double total_ms = 7;
  // cert_expiry_days is the days until the TLS certificate expires,
  // or -1 for plain HTTP / unknown.
  double cert_expiry_days = 8;
  string server_ip = 9;
}

message TcpResult {
  string target = 1;
  bool connected = 2;
  double connect_ms = 3;
}

message WlanScanResult {
  string interface = 1;
  repeated AccessPoint access_points = 2;
  bool demo = 3; // true when the data is synthetic (NETLAMA_WLAN_DEMO)
}

message AccessPoint {
  string bssid = 1;
  string ssid = 2; // empty = hidden network
  uint32 channel = 3;
  uint32 freq_mhz = 4;
  string band = 5;      // "2.4 GHz" / "5 GHz" / "6 GHz"
  double rssi_dbm = 6;
  string security = 7;  // "Open" / "WEP" / "WPA" / "WPA2" / "WPA3"
}

message WlanSenseResult {
  string interface = 1;
  bool demo = 2;                    // synthetic (NETLAMA_WLAN_SENSE_DEMO)
  repeated WlanStation stations = 3;
  repeated WlanChannelStat channels = 4;
  uint32 sweep_ms = 5;              // total sweep duration
  repeated WlanNetwork networks = 6; // APs/SSIDs heard from beacons
}

message WlanPassiveResult {
  string interface = 1;
  bool demo = 2;                    // synthetic (NETLAMA_WLAN_DEMO)
  repeated WlanStation stations = 3;
  repeated WlanChannelStat channels = 4;
  uint32 sweep_ms = 5;              // total sweep duration
  repeated WlanNetwork networks = 6; // APs/SSIDs heard from beacons
}

message WlanNetwork {
  string bssid = 1;
  string ssid = 2;        // empty = hidden network
  uint32 channel = 3;     // channel it was heard on
  uint32 freq_mhz = 4;
  int32 rssi_dbm = 5;     // strongest beacon RSSI
  uint32 beacons = 6;     // beacon/probe-response frames seen
  string security = 7;    // "Open", "WEP", "WPA2", "WPA2/WPA3", "WPA3", ...
  string standards = 8;   // PHY generations from IEs, e.g. "n/ac/ax"
  uint32 width_mhz = 9;          // channel width from HT/VHT operation IEs (20/40/80/160)
  uint32 beacon_interval_tu = 10; // beacon interval in time units (1 TU = 1.024 ms)
  string country = 11;           // country code from the Country IE, e.g. "AT"
  bool load_present = 12;        // BSS Load IE seen (station_count/channel_util valid)
  uint32 load_stations = 13;     // associated station count reported by the AP
  double load_channel_util_pct = 14; // AP-reported channel utilization 0-100
  string security_detail = 15;   // AKM + cipher, e.g. "PSK+SAE · CCMP"
  string roaming = 16;           // 802.11 roaming amendments seen, e.g. "k/r/v"
  string mfp = 17;               // management frame protection: "", "capable", "required"
  string group_cipher = 18;      // RSN group cipher, e.g. "CCMP"
  uint32 dtim_period = 19;       // DTIM period from the TIM element
  bool wps = 20;                 // WPS vendor element present
  uint32 streams = 21;           // spatial streams from HT/VHT MCS maps (0 = unknown)
  double max_rate_mbps = 22;     // estimated max PHY rate from gen/width/streams
  int64 last_seen_ms = 23;       // unix ms of the last beacon heard (agent retains APs ~10 min)
}

message WlanStation {
  string mac = 1;
  string bssid = 2;        // empty for probe-only stations
  string ssid = 3;         // resolved from beacons when known
  int32 rssi_dbm = 4;      // last seen
  int32 rssi_avg_dbm = 5;
  double rate_mbps = 6;    // last observed data rate (0 = unknown)
  int32 mcs = 7;           // -1 = unknown/legacy
  uint32 frames = 8;
  bool probe_only = 9;     // only seen probing, not associated
  int64 last_seen_ms = 10; // unix ms
}

message WlanChannelStat {
  uint32 channel = 1;
  uint32 freq_mhz = 2;
  uint64 active_ms = 3;
  uint64 busy_ms = 4;
  double utilization_pct = 5; // busy/active*100, 0 if survey unavailable
  uint32 frames = 6;
}

message TracerouteResult {
  string target = 1;
  string target_ip = 2;
  bool reached = 3;
  // status: "reached" (target answered), "stalled" (path broke before
  // the target), or "error" (probe could not run).
  string status = 4;
  uint32 failure_hop = 5; // TTL of the last responding hop when stalled
  double rtt_ms = 6;      // RTT to the destination (or last responder)
  bool demo = 7;
  repeated Hop hops = 8;
}

message Hop {
  uint32 ttl = 1;
  string host = 2;        // IP; empty = anonymous (no reply)
  double loss_percent = 3;
  double avg_rtt_ms = 4;
  double best_rtt_ms = 5;
  double worst_rtt_ms = 6;
  uint32 sent = 7;
  double jitter_ms = 8;
  string host_name = 9;   // reverse-DNS name; empty when not resolved
}

message LogEntry {
  google.protobuf.Timestamp time = 1;
  string level = 2;
  string message = 3;
  string scope = 4;
}

message AgentStats {
  google.protobuf.Timestamp time = 1;
  double cpu_percent = 2;      // 0 when not yet measurable
  uint64 mem_used_bytes = 3;
  uint64 mem_total_bytes = 4;
  uint64 disk_used_bytes = 5;
  uint64 disk_total_bytes = 6;
  double agent_cpu_percent = 7;  // agent process share of host CPU
  uint64 agent_mem_bytes = 8;    // agent process RSS
  uint32 pid_count = 9;          // processes in the agent's container
  uint64 uptime_seconds = 10;    // agent process uptime
}
