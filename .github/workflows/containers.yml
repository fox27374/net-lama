name: Build and publish container images

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component: [server, agent, agent-sensor]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Image metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/netlama-${{ matrix.component }}
        tags: |
          # latest follows every build here — only main and v* tags trigger,
          # and a release tag build must update latest too (agents pull it)
          type=raw,value=latest
          type=semver,pattern={{version}}
          type=sha

    - name: Determine version
      id: version
      # Same computation as the local Makefile (git describe --tags), not
      # branched on which trigger fired. A main push and a v* tag push
      # for the same commit used to disagree (branch push always said
      # git-<sha>) and race for the `latest` tag, so whichever run
      # finished last decided the version string baked into `latest` —
      # cosmetically wrong even though the code was identical. Describing
      # the actual commit makes both runs agree.
      run: echo "value=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Containerfile
        target: ${{ matrix.component }}
        platforms: linux/amd64,linux/arm64
        push: true
        build-args: |
          VERSION=${{ steps.version.outputs.value }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=${{ matrix.component }}
        cache-to: type=gha,scope=${{ matrix.component }},mode=max
