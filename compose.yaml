# Net-Lama server + agent.
#
# Server only:            docker compose up -d server
# Server + local agent:   1. open the UI (:9090), create a site + agent,
#                            copy the one-time token
#                         2. echo "NETLAMA_TOKEN=<token>" >> .env
#                         3. docker compose up -d
#
# Works the same with podman-compose. Image tags can be overridden via
# NETLAMA_IMAGE_TAG (default: latest).

services:
  server:
    image: ${NETLAMA_SERVER_IMAGE:-ghcr.io/fox27374/netlama-server}:${NETLAMA_IMAGE_TAG:-latest}
    ports:
      - "9090:9090"    # web UI, JSON API, Prometheus /metrics
      - "50051:50051"  # gRPC control stream for agents
    volumes:
      - netlama-data:/data
    environment:
      # Password for the initial admin user (only used on first start
      # with an empty database; otherwise ignored).
      NETLAMA_ADMIN_PASSWORD: ${NETLAMA_ADMIN_PASSWORD:-}
      # TLS for the gRPC control stream and the HTTPS UI. Provide a real
      # cert (NETLAMA_TLS_CERT/KEY) or set NETLAMA_TLS_SELF_SIGNED=1 to
      # auto-generate one (list UI hostnames/IPs in NETLAMA_TLS_HOSTS).
      NETLAMA_TLS_CERT: ${NETLAMA_TLS_CERT:-}
      NETLAMA_TLS_KEY: ${NETLAMA_TLS_KEY:-}
      NETLAMA_TLS_SELF_SIGNED: ${NETLAMA_TLS_SELF_SIGNED:-}
      NETLAMA_TLS_HOSTS: ${NETLAMA_TLS_HOSTS:-}
      # mTLS: set NETLAMA_MTLS=1 to require per-agent client certs on the
      # control stream (built-in agent CA; issue certs with
      # `docker compose run --rm server -issue-agent-cert <agent-name>`),
      # or point NETLAMA_MTLS_CA at your own CA bundle.
      NETLAMA_MTLS: ${NETLAMA_MTLS:-}
      NETLAMA_MTLS_CA: ${NETLAMA_MTLS_CA:-}
      # How many log lines (Info+) to keep per scope (the server, and each
      # agent) for the Logs page. Default: 1000.
      NETLAMA_LOG_HISTORY: ${NETLAMA_LOG_HISTORY:-}
      # SMTP configuration for email alert notifications.
      # Host is required to enable email notifications; others are optional.
      # Port default: 587. StartTLS default: enabled (1).
      NETLAMA_SMTP_HOST: ${NETLAMA_SMTP_HOST:-}
      NETLAMA_SMTP_PORT: ${NETLAMA_SMTP_PORT:-}
      NETLAMA_SMTP_USER: ${NETLAMA_SMTP_USER:-}
      NETLAMA_SMTP_PASS: ${NETLAMA_SMTP_PASS:-}
      NETLAMA_SMTP_FROM: ${NETLAMA_SMTP_FROM:-}
      NETLAMA_SMTP_STARTTLS: ${NETLAMA_SMTP_STARTTLS:-}
    restart: unless-stopped

  # The agent needs a token that only exists after it was created in
  # the UI — start the server alone first (see header).
  agent:
    # Reap zombie processes from exec'd tools (mtr, iw) — without an
    # init, orphaned children pile up until the container cannot fork.
    init: true
    image: ${NETLAMA_AGENT_IMAGE:-ghcr.io/fox27374/netlama-agent}:${NETLAMA_IMAGE_TAG:-latest}
    environment:
      NETLAMA_SERVER: ${NETLAMA_SERVER:-server:50051}
      NETLAMA_TOKEN: ${NETLAMA_TOKEN:?create the agent in the UI and put its token into .env}
      # Connect over TLS when the server has it enabled. Verify with
      # NETLAMA_TLS_CA (a copy of the server cert) or set
      # NETLAMA_TLS_INSECURE=1 to encrypt without verifying.
      NETLAMA_TLS: ${NETLAMA_TLS:-}
      NETLAMA_TLS_CA: ${NETLAMA_TLS_CA:-}
      NETLAMA_TLS_INSECURE: ${NETLAMA_TLS_INSECURE:-}
      # mTLS client certificate (mount the files into the container, e.g.
      # via a bind mount, and point these at the in-container paths).
      NETLAMA_TLS_CERT: ${NETLAMA_TLS_CERT:-}
      NETLAMA_TLS_KEY: ${NETLAMA_TLS_KEY:-}
      # Set NETLAMA_WLAN_DEMO=1 to emit synthetic WLAN passive-mode sensing
      # data (networks, stations, channel utilization) on hosts without a
      # wireless radio (for trying the Wireless UI). Leave unset for real
      # monitor-mode capture (needs a monitor-capable interface + NET_ADMIN).
      NETLAMA_WLAN_DEMO: ${NETLAMA_WLAN_DEMO:-}
      # Override the wireless interface for wlan_passive tests (e.g., to force
      # a specific adapter when multiple monitor-capable interfaces are present).
      # Leave unset to auto-pick the first monitor-capable interface.
      # NETLAMA_WLAN_IFACE: ${NETLAMA_WLAN_IFACE:-}
      # Set to a port (e.g. 5252) to run an agent-to-agent throughput
      # reflector for perfmon tests; opens a listening port, so opt-in.
      # Leave unset to disable (no listener, no perfmon_reflector capability).
      # NETLAMA_PERFMON_PORT: ${NETLAMA_PERFMON_PORT:-}
      # Host/IP other agents can reach this one's perfmon reflector on, e.g.
      # its LAN IP. Required for this agent to show up as a perfmon
      # destination — there is no auto-detection, since guessing would
      # silently fail across NAT. Leave unset to not advertise (even if the
      # reflector above is running).
      # NETLAMA_PERFMON_ADVERTISE_HOST: ${NETLAMA_PERFMON_ADVERTISE_HOST:-}
      # Set NETLAMA_TRACEROUTE_DEMO=1 to emit synthetic path data (for the
      # Path UI) where raw-socket traceroute is not available. Leave unset
      # for real traceroute (needs mtr in the image + CAP_NET_RAW; see README).
      NETLAMA_TRACEROUTE_DEMO: ${NETLAMA_TRACEROUTE_DEMO:-}
    sysctls:
      # Allow unprivileged ICMP ping inside the container
      # (list form: the mapping form breaks podman-compose 1.0.x)
      - net.ipv4.ping_group_range=0 65535
    depends_on:
      - server
    restart: unless-stopped

volumes:
  netlama-data:
    # Fixed name (no project prefix) so the volume survives project renames
    name: netlama-data
